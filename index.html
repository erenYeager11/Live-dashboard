<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vardhman Dashboard — UPDATE sample file for dashboard updated.xlsx</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════ */
:root {
  /* Layout */
  --sb-w: 250px;
  --sb-w-col: 78px;
  --radius: 22px;
  --radius-sm: 12px;

  /* Colors */
  --page-bg: #060606;
  --surface: rgba(255, 255, 255, 0.04);
  --surface-hover: rgba(255, 255, 255, 0.06);
  --surface-active: rgba(59, 255, 91, 0.08);

  /* Brand Greens */
  --green-primary: #3BFF5B;
  --green-secondary: #22C55E;
  --green-glow: rgba(59, 255, 91, 0.35);
  --lime: #A3FF12;

  /* Text */
  --text-primary: #F8FAFC;
  --text-secondary: #D1D5DB;
  --text-muted: #9CA3AF;
  --text-inv: #000000;

  /* Border */
  --border: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.15);

  /* Status */
  --red: #FD625E;
  --amber: #F2C80F;

  /* Shadow */
  --shadow-card: 0 10px 40px rgba(0, 0, 0, 0.35), inset 0 1px rgba(255, 255, 255, 0.05);
  --shadow-hover: 0 20px 60px rgba(0, 0, 0, 0.45), 0 0 30px rgba(59, 255, 91, 0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: radial-gradient(circle at 15% 50%, rgba(34, 197, 94, 0.15) 0%, #060606 50%), #060606;
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  padding: clamp(0px, 2vw, 16px); /* Fluid padding for floating shell */
}

/* ═══════════════════════════════════════════════════
   UPLOAD SCREEN
═══════════════════════════════════════════════════ */
.up-page {
  min-height: calc(100vh - 32px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
}
.up-card {
  background: var(--surface);
  backdrop-filter: blur(18px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  padding: 52px;
  width: 100%;
  max-width: 560px;
  text-align: center;
}
.up-logo {
  width: 56px; height: 56px;
  border-radius: 14px;
  background: var(--surface-hover);
  border: 1px solid var(--green-primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; color: var(--green-primary);
  margin: 0 auto 24px;
  box-shadow: 0 0 20px rgba(59, 255, 91, 0.2);
}
.up-title { font-size: 28px; font-weight: 800; color: var(--text-primary); margin-bottom: 8px; line-height: 1.2; }
.up-sub { font-size: 15px; color: var(--text-secondary); margin-bottom: 36px; line-height: 1.6; }
.drop-zone {
  border: 2px dashed var(--border-strong);
  border-radius: var(--radius-sm);
  padding: 44px 32px;
  cursor: pointer;
  transition: all .3s ease;
  background: rgba(0,0,0,0.2);
  position: relative;
}
.drop-zone:hover, .drop-zone.over {
  border-color: var(--green-primary);
  background: var(--surface-active);
  box-shadow: 0 0 30px rgba(59, 255, 91, 0.05);
}
.drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.drop-icon { font-size: 40px; margin-bottom: 12px; }
.drop-label { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.drop-hint { font-size: 13px; color: var(--text-muted); }
.up-features {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-top: 28px; text-align: left;
}
.up-feat {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text-secondary);
  padding: 8px 12px;
  background: var(--surface);
  border-radius: 8px;
  border: 1px solid var(--border);
}
.up-feat span { font-size: 15px; }
.up-err {
  margin-top: 16px; font-size: 13px; color: var(--red);
  padding: 10px 16px; background: rgba(253,98,94,0.1);
  border: 1px solid rgba(253,98,94,0.2); border-radius: 8px;
}

/* ═══════════════════════════════════════════════════
   LOADER
═══════════════════════════════════════════════════ */
.loader-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
.loader-spin { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }
.loader-txt { font-size: 14px; color: var(--text-muted); font-weight: 500; letter-spacing: .5px; }

/* ═══════════════════════════════════════════════════
   SHELL — sidebar + content
═══════════════════════════════════════════════════ */
.shell { 
  display: flex; 
  height: calc(100vh - clamp(0px, 4vw, 32px));
  max-width: 1800px;
  margin: 0 auto;
  border-radius: clamp(0px, 3vw, 28px);
  overflow: hidden;
  background: rgba(10, 10, 10, 0.4);
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 80px rgba(0,0,0,0.5), inset 0 1px rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
}

/* SIDEBAR */
.sidebar {
  width: var(--sb-w);
  flex-shrink: 0;
  background: linear-gradient(180deg, rgba(10,10,10,0.95), rgba(14,20,14,0.98));
  box-shadow: inset 1px 0 rgba(59,255,91,0.08), 0 0 40px rgba(34,197,94,0.08);
  display: flex;
  flex-direction: column;
  position: relative;
  height: 100%;
  overflow-y: auto;
  border-right: 1px solid var(--border);
  transition: width 0.3s ease;
}
.sidebar.collapsed { width: var(--sb-w-col); }
.sidebar.collapsed .sb-name, 
.sidebar.collapsed .sb-sub, 
.sidebar.collapsed .sb-section-label, 
.sidebar.collapsed .sb-lbl, 
.sidebar.collapsed .sb-sub-lbl, 
.sidebar.collapsed .sb-file-info,
.sidebar.collapsed .sb-footer-text,
.sidebar.collapsed .sb-toggle-btn { 
  display: none; 
}
.sidebar.collapsed .sb-brand {
  justify-content: center;
  padding: 24px 0 20px;
}
.sidebar.collapsed .sb-nav {
  padding: 4px 12px;
}
.sidebar.collapsed .sb-item {
  justify-content: center;
  padding: 12px 0;
  margin-bottom: 8px;
}
.sidebar.collapsed .sb-item.active {
  padding-left: 0;
  border-left: none;
  background: var(--surface-2);
  border-radius: 8px;
}
.sidebar.collapsed .sb-icon {
  margin: 0;
}
.sidebar.collapsed .sb-footer {
  padding: 16px 8px;
  align-items: center;
}
.sidebar.collapsed .sb-footer-btn {
  justify-content: center;
  padding: 12px;
  width: auto;
}
.sidebar::-webkit-scrollbar { display: none; }
.sb-brand {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.sb-brand-info { display: flex; flex-direction: column; overflow: hidden; white-space: nowrap; }
.sb-logo {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--surface-active); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--green-primary);
  border: 1px solid rgba(59,255,91,0.2);
  box-shadow: inset 0 0 10px rgba(59,255,91,0.1), 0 0 10px rgba(59,255,91,0.2);
}
.sb-name { font-size: 14px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
.sb-sub { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }

.sb-section-label {
  padding: 16px 20px 6px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  white-space: nowrap; overflow: hidden;
}
.sb-nav { padding: 4px 12px; }
.sb-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-radius: 50px;
  cursor: pointer;
  transition: all .3s ease;
  margin-bottom: 4px;
  white-space: nowrap; overflow: hidden;
  color: var(--text-secondary);
}
.sb-item:hover { 
  background: var(--surface-hover); 
  color: var(--green-primary);
  box-shadow: inset 0 0 20px rgba(59,255,91,0.05);
}
.sb-item.active { 
  background: var(--surface-active); 
  border-left: none; 
  padding-left: 14px; 
  border: 1px solid rgba(59,255,91,0.1);
  box-shadow: 0 0 20px rgba(59,255,91,0.1);
}
.sb-item .sb-icon { font-size: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; width: 20px; transition: all .3s ease;}
.sb-item .sb-lbl { font-size: 13px; font-weight: 500; line-height: 1.2; transition: all .3s ease;}
.sb-item .sb-sub-lbl { font-size: 10px; opacity: 0.6; }
.sb-item.active .sb-icon { color: var(--green-primary); filter: drop-shadow(0 0 8px rgba(59,255,91,0.6)); }
.sb-item.active .sb-lbl { color: var(--text-primary); font-weight: 600; }
.sb-item.active .sb-sub-lbl { color: var(--green-primary); opacity: 0.8; }

.sb-footer {
  margin-top: auto;
  padding: 16px 12px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 6px;
  overflow: hidden; white-space: nowrap;
}
.sb-footer-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 10px 14px;
  border-radius: 50px; border: 1px solid var(--border);
  cursor: pointer; transition: all .3s ease;
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
  background: var(--surface); color: var(--text-primary);
}
.sb-footer-btn.download {
  background: var(--surface-active); color: var(--green-primary); border-color: rgba(59,255,91,0.2);
}
.sb-footer-btn.download:hover { 
  background: rgba(59,255,91,0.15); 
  box-shadow: 0 0 20px rgba(59,255,91,0.2);
}
.sb-footer-btn.reset {
  background: transparent; color: var(--text-secondary); border: 1px solid var(--border-strong);
}
.sb-footer-btn.reset:hover { background: var(--surface-hover); color: var(--text-primary); }
.sb-file-info { padding: 0 10px 8px; }
.sb-file-name { font-size: 11px; color: var(--text-muted); word-break: break-all; line-height: 1.4; }

/* CONTENT */
.content { 
  flex: 1; min-width: 0; padding: 24px; 
  overflow-x: hidden; overflow-y: auto; 
  scrollbar-width: none; -ms-overflow-style: none; 
}
.content::-webkit-scrollbar { display: none; }

/* ═══════════════════════════════════════════════════
   PAGE HEADER
═══════════════════════════════════════════════════ */
.page-header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-start; }
.page-header-left { display: flex; flex-direction: column; }
.menu-toggle { background: none; border: 1px solid var(--border); border-radius: 4px; font-size: 16px; cursor: pointer; padding: 4px 8px; color: var(--text-secondary); margin-right: 12px; display: flex; align-items: center; justify-content: center; height: 32px;}
.menu-toggle:hover { background: var(--surface-2); }
.header-title-row { display: flex; align-items: center; margin-bottom: 2px; }
.page-header h1 { font-size: clamp(20px, 3vw, 24px); font-weight: 600; color: var(--text-primary); }
.page-header p { font-size: clamp(11px, 1.5vw, 12px); color: var(--text-muted); }
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.breadcrumb span { color: var(--text-muted); }

/* ═══════════════════════════════════════════════════
   KPI CARDS
═══════════════════════════════════════════════════ */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card, .chart-card, .table-card {
  background: var(--surface);
  backdrop-filter: blur(18px);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-card);
  transition: all 0.3s ease;
}
.kpi-card:hover, .chart-card:hover, .table-card:hover { 
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}
.kpi-card { padding: clamp(16px, 2.5vw, 24px); }
.kpi-label { font-size: clamp(10px, 1.5vw, 12px); font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.kpi-number { font-size: clamp(24px, 4vw, 32px); font-weight: 700; line-height: 1; font-family: 'Inter', sans-serif; margin-bottom: 6px; color: var(--text-primary); text-shadow: 0 0 10px rgba(255,255,255,0.1); }
.kpi-number.blue, .kpi-number.green { color: var(--green-primary); text-shadow: 0 0 15px var(--green-glow); }
.kpi-number.red { color: var(--red); text-shadow: 0 0 15px rgba(253,98,94,0.3); }
.kpi-number.amber { color: var(--amber); text-shadow: 0 0 15px rgba(242,200,15,0.3); }
.kpi-number.neutral { color: var(--text-primary); }
.kpi-desc { font-size: 12px; color: var(--text-secondary); }
.kpi-card.highlight { border: 1px solid var(--green-primary); background: var(--surface-active); box-shadow: 0 0 30px rgba(59,255,91,0.15); }
.kpi-card.highlight .kpi-label { color: var(--green-primary); }
.kpi-card.highlight .kpi-number { color: var(--green-primary); }
.kpi-card.highlight .kpi-desc { color: rgba(59,255,91,0.8); }
.kpi-card.clickable { cursor: pointer; transition: all 0.3s ease; }
.kpi-card.clickable:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
.kpi-card.active-approved { border-color: var(--green-primary); box-shadow: 0 0 30px rgba(59,255,91,0.2); background: var(--surface-active); }
.kpi-card.active-rejected { border-color: var(--red); box-shadow: 0 0 30px rgba(253,98,94,0.2); background: rgba(253,98,94,0.08); }

/* CREATOR CREDIT */
.creator-credit {
  margin-top: 8px;
  text-align: center;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  opacity: 0.5;
  transition: all 0.3s ease;
}
.creator-credit:hover {
  opacity: 1;
  color: var(--green-primary);
  text-shadow: 0 0 10px var(--green-glow);
}

/* ═══════════════════════════════════════════════════
   SECTION DIVIDER
═══════════════════════════════════════════════════ */
.sec-divider { margin-bottom: 20px; }
.sec-divider h2 { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; }
.sec-divider p { font-size: 13px; color: var(--text-secondary); }

/* ═══════════════════════════════════════════════════
   FILTER BAR (count selector)
═══════════════════════════════════════════════════ */
.filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; align-items: center; }
.filter-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-right: 8px; }
.filter-btn {
  padding: 8px 16px;
  border-radius: 50px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .3s ease;
  font-family: 'Inter', sans-serif;
  backdrop-filter: blur(10px);
}
.filter-btn:hover { border-color: var(--green-primary); color: var(--green-primary); background: var(--surface-hover); box-shadow: 0 0 15px rgba(62, 59, 255, 0.1); }
.filter-btn.active { background: var(--surface-active); border-color: var(--green-primary); color: var(--green-primary); font-weight: 600; box-shadow: inset 0 0 10px rgba(59,255,91,0.1), 0 0 20px rgba(59,255,91,0.2); }

/* ═══════════════════════════════════════════════════
   CHART CARDS
═══════════════════════════════════════════════════ */
.chart-grid { display: grid; gap: 20px; margin-bottom: 24px; }
.chart-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.chart-grid.cols-1 { grid-template-columns: 1fr; }
.chart-card {
  padding: 24px;
}
.chart-card-header { margin-bottom: 16px; }
.chart-card-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.chart-card-sub { font-size: 13px; color: var(--text-muted); }
.chart-wrap { position: relative; }

/* ═══════════════════════════════════════════════════
   LEGEND
═══════════════════════════════════════════════════ */
.legend { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

/* ═══════════════════════════════════════════════════
   DATA TABLE (sortable)
═══════════════════════════════════════════════════ */
.table-card {
  margin-bottom: 24px;
  overflow: hidden;
}
.table-card-header { padding: 20px 24px 0; border-bottom: 1px solid var(--border); }
.table-card-title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.table-card-sub { font-size: 12px; color: var(--text-muted); padding-bottom: 14px; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }

thead tr { background: rgba(255,255,255,0.02); }
th {
  padding: 10px 12px;
  font-size: 10px; font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
th:hover { color: var(--text-primary); background: var(--surface-hover); }
th.sorted { color: var(--green-primary); text-shadow: 0 0 10px rgba(59,255,91,0.5); }

tbody tr { border-bottom: 1px solid var(--border); transition: background .3s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover td { background: var(--surface-hover); }
tbody tr.vfb td { background: rgba(242,200,15,0.05); }
tbody tr.vfb:hover td { background: rgba(242,200,15,0.1); }

td {
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text-secondary);
  text-align: left;
  white-space: nowrap;
}
td.primary { font-weight: 600; color: var(--text-primary); }
td.number { font-family: 'Inter', sans-serif; font-size: 12px; text-align: right; }
td.good { color: var(--green-primary); font-weight: 600; font-family: 'Inter', sans-serif; font-size: 12px; text-align: right; text-shadow: 0 0 10px rgba(59,255,91,0.3); }
td.bad { color: var(--red); font-weight: 600; font-family: 'Inter', sans-serif; font-size: 12px; text-align: right; text-shadow: 0 0 10px rgba(253,98,94,0.3); }
td.bench { color: var(--amber); font-weight: 600; font-family: 'Inter', sans-serif; font-size: 12px; text-align: right; text-shadow: 0 0 10px rgba(242,200,15,0.3); }
td.center { text-align: center; }

.wrap-text td {
  white-space: normal;
  word-break: break-word;
  vertical-align: top;
  line-height: 1.5;
  min-width: 150px;
}


.vfb-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 999px;
  background: rgba(242,200,15,0.1); color: var(--amber);
  border: 1px solid rgba(242,200,15,0.2);
  margin-left: 6px; vertical-align: middle;
  letter-spacing: .3px;
  box-shadow: 0 0 10px rgba(242,200,15,0.1);
}

/* ═══════════════════════════════════════════════════
   RAW TABLE (Yarn / Process)
═══════════════════════════════════════════════════ */
.raw-wrap {
  overflow: auto;
  max-height: 72vh;
  border-radius: 0 0 var(--radius) var(--radius);
}
.raw-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
.raw-wrap::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
.raw-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
.raw-wrap::-webkit-scrollbar-thumb:hover { background: var(--green-primary); }

.raw-table { width: max-content; border-collapse: collapse; }
.raw-table th {
  padding: 10px 12px;
  font-size: 10px; font-weight: 600;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
  background: rgba(10,10,10,0.8); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  white-space: nowrap; text-align: left;
  position: sticky; top: 0; z-index: 2;
}
.raw-table th:first-child { position: sticky; left: 0; z-index: 3; background: rgba(10,10,10,0.9); }
.raw-table td {
  padding: 10px 12px;
  font-size: 12px; color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid rgba(255,255,255,0.02);
  white-space: nowrap;
  font-family: 'Inter', sans-serif;
  transition: background-color 0.2s ease, color 0.2s ease;
}
.raw-table td:first-child {
  color: var(--text-primary); font-weight: 600;
  background: var(--page-bg);
  position: sticky; left: 0; z-index: 1;
  border-right: 1px solid var(--border);
  font-family: 'Inter', sans-serif; font-size: 12px;
}
.raw-table tr:hover td { 
  background: var(--surface-active); 
  color: var(--text-primary); 
}
.raw-table tr:hover td:first-child { 
  background: #0a110a; /* Deep dark green tint for sticky column */
  color: var(--green-primary); 
}

/* ═══════════════════════════════════════════════════
   FINAL SUMMARY BADGES
═══════════════════════════════════════════════════ */
.badge-approved {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 12px; border-radius: 999px;
  background: var(--green-bg); color: var(--green);
  border: 1px solid var(--green-border);
  font-size: 12px; font-weight: 700;
}
.badge-rejected {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 12px; border-radius: 999px;
  background: var(--red-bg); color: var(--red);
  border: 1px solid var(--red-border);
  font-size: 12px; font-weight: 700;
}

/* ═══════════════════════════════════════════════════
   RAW TABLE PAGINATION
═══════════════════════════════════════════════════ */
.raw-pagination {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface-2);
  border-radius: 0 0 var(--radius) var(--radius);
}
.raw-page-info { font-size: 13px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
.raw-page-info strong { color: var(--text-secondary); }
.raw-page-btns { display: flex; gap: 6px; align-items: center; }
.raw-page-btn {
  padding: 6px 14px; border-radius: 7px;
  border: 1px solid var(--border); background: var(--surface);
  font-size: 13px; font-weight: 500; color: var(--text-secondary);
  cursor: pointer; transition: all .15s;
  font-family: 'Inter', sans-serif;
}
.raw-page-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); }
.raw-page-btn:disabled { opacity: .4; cursor: default; }
.raw-page-btn.active { background: var(--blue); border-color: var(--blue); color: white; font-weight: 600; }
.raw-search {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 20px 0;
}
.raw-search input {
  flex: 1; padding: 8px 14px;
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  background: var(--surface); outline: none;
  transition: all .3s ease;
}
.raw-search input:hover {
  background: var(--surface-hover);
  border-color: rgba(59, 255, 91, 0.3);
  box-shadow: 0 0 10px rgba(59, 255, 91, 0.05);
}
.raw-search input:focus {
  border-color: var(--green-primary);
  background: var(--surface);
  box-shadow: 0 0 15px rgba(59, 255, 91, 0.15);
  outline: none;
}
.raw-search input::placeholder {
  color: var(--text-muted);
}
.raw-search input::selection {
  background: rgba(59, 255, 91, 0.2);
  color: var(--text-primary);
}
.raw-search input:-webkit-autofill,
.raw-search input:-webkit-autofill:hover, 
.raw-search input:-webkit-autofill:focus, 
.raw-search input:-webkit-autofill:active {
  -webkit-box-shadow: 0 0 0 30px var(--page-bg) inset !important;
  -webkit-text-fill-color: var(--text-primary) !important;
  transition: background-color 5000s ease-in-out 0s;
}
.raw-search label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.raw-row-count { font-size: 12px; color: var(--text-muted); padding: 0 20px 10px; }

/* ═══════════════════════════════════════════════════
   INFO BOX
═══════════════════════════════════════════════════ */
.info-box {
  display: flex; gap: 12px; align-items: flex-start;
  background: rgba(59,255,91,0.05); border: 1px solid rgba(59,255,91,0.2);
  border-radius: var(--radius); padding: 14px 18px;
  margin-bottom: 22px;
}
.info-box-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; filter: drop-shadow(0 0 5px rgba(59,255,91,0.5)); }
.info-box p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.info-box strong { font-weight: 700; color: var(--green-primary); }

/* ═══════════════════════════════════════════════════
   EMPTY
═══════════════════════════════════════════════════ */
.empty-state { text-align: center; padding: 64px 32px; color: var(--text-muted); }
.empty-state p { font-size: 15px; }

/* ═══════════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════════ */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.fade { animation: fadeIn .25s ease both; }

/* ═══════════════════════════════════════════════════
   RESPONSIVE & ADAPTIVE SYSTEM
═══════════════════════════════════════════════════ */
/* MOBILE SIDEBAR OVERLAY */
.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(5px);
  z-index: 90;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.sidebar-overlay.open { opacity: 1; pointer-events: auto; }

/* TABLET & MOBILE (<= 1023px) */
@media(max-width: 1023px) {
  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transform: translateX(-100%);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    height: 100vh;
    border-radius: 0 28px 28px 0;
    box-shadow: 20px 0 50px rgba(0,0,0,0.5);
  }
  .sidebar.open { transform: translateX(0); }
  .menu-toggle { display: flex !important; min-width: 44px; min-height: 44px; justify-content: center; align-items: center; } /* Touch friendly */
  .chart-grid.cols-2 { grid-template-columns: 1fr; }
}

/* DESKTOP (>= 1024px) */
@media(min-width: 1024px) {
  .menu-toggle { display: none !important; }
}

/* MOBILE ONLY (<= 767px) */
@media(max-width: 767px) {
  .kpi-grid { grid-template-columns: 1fr; } /* Stack KPIs vertically */
  .content { padding: 16px 12px; }
  .page-header { flex-direction: column; gap: 12px; }
  .up-card { padding: 32px 20px; }
  .up-features { grid-template-columns: 1fr; }
  .filter-btn { padding: 10px 16px; font-size: 14px; } /* Larger tap target */
  .kpi-card, .chart-card, .table-card-header { padding: 16px; }
  .chart-card-title { font-size: 15px; }
}

/* TOUCH TARGET OPTIMIZATIONS */
button, .filter-btn, .sb-nav-item, .sb-footer-btn { min-height: 44px; }

<script type="text/babel">

const {useState,useEffect,useRef,useMemo,useCallback}=React;

// ─── UTILS ───────────────────────────────────────────────────────────────────
const pn=v=>{if(v===null||v===undefined)return null;const s=String(v).trim();if(!s||s.toUpperCase()==='NA'||s==='-'||s==='—')return null;const n=parseFloat(s);return isNaN(n)?null:n;};
const fmt=(v,d=2)=>(v===null||v===undefined)?'—':Number(v).toFixed(d);
const avg=arr=>{const v=arr.filter(x=>x!==null&&!isNaN(x));return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;};
function isVFB(s){if(!s)return false;const u=String(s).toUpperCase().replace(/[\s.]+/g,'');return u.includes('VFB')||u.includes('V.F.B')||u==='VYS'||u.includes('VARDHMAN');}
function short(n,m=16){if(!n)return'';const MAP={'GIMATEX INDUSTRIC LIMITED':'Gimatex','GIMATEX INDUSTRIC':'Gimatex','NAHAR SPINING MILLS':'Nahar','NITIN SPINNER':'Nitin','PATIALA GOLD':'Patiala Gold','MAHARAJA SHREE UNMAID':'Maharaja','MAHARAJA SHREE UMAID':'Maharaja','BANNARI AMMAN SPININING MILLS':'Bannari Amman','SREE LALITHA  SPG. MILLS':'Sree Lalitha','SREE LALITHA SPG. MILLS':'Sree Lalitha','VISWATEJA':'Viswateja'};const u=n.toUpperCase().trim();for(const[k,v]of Object.entries(MAP))if(u.includes(k))return v;return n.length>m?n.substring(0,m-1)+'…':n;}
function normKey(k){return String(k||'').toUpperCase().trim().replace(/\s+/g,' ');}
function findVal(row,cands){const keys=Object.keys(row);for(const c of cands){const cn=normKey(c).replace(/\s/g,'');for(const k of keys)if(normKey(k).replace(/\s/g,'')==cn)return row[k];}return undefined;}
function groupBy(arr,key){const g={};arr.forEach(r=>{const k=String(r[key]||'').trim();if(!k)return;if(!g[k])g[k]=[];g[k].push(r);});return g;}
function barC(v,ref,lower){
  if(v===null||ref===null)return'rgba(59,255,91,0.6)';
  if(lower)return v<=ref?'#3BFF5B':'#FD625E';
  return v>=ref?'#3BFF5B':'#FD625E';
}
const rl=(val,len,lbl)=>val!==null?{label:`VFB ${lbl} (${fmt(val)})`,data:Array(len).fill(val),type:'line',borderColor:'#F2C80F',borderWidth:2,borderDash:[4,4],pointRadius:0,fill:false,tension:0,order:-1}:null;

// ─── EXCEL PARSER ────────────────────────────────────────────────────────────
function parseExcel(buffer){
  const wb=XLSX.read(buffer,{type:'array'});
  const out={suppLoom:[],suppWarp:[],loom:[],warp:[],yarnParam:[],processResults:[],finalSummary:[],fileName:'',sheets:wb.SheetNames};
  for(const sn of wb.SheetNames){
    const sl=sn.toLowerCase().replace(/[\s_]+/g,'');
    const sheet=wb.Sheets[sn];
    const aoa=XLSX.utils.sheet_to_json(sheet,{header:1,defval:''});
    const rows=XLSX.utils.sheet_to_json(sheet,{defval:null,raw:true});
    if(sl.includes('supplierwi')&&sl.includes('loom')){
      out.suppLoom=rows.map(r=>({supplier:String(findVal(r,['Yarn Suppler','Yarn Supplier','Supplier'])||'').trim(),count:String(findVal(r,['Count'])||'').trim(),shifts:pn(findVal(r,['No of Shift','No Of Shift'])),effi:pn(findVal(r,['EFFI.','EFFI'])),rpm:pn(findVal(r,['RPM'])),weftCmpx:pn(findVal(r,['Weft Cmpx','Weft CMPX','Weft Cmpx '])),warpCmpx:pn(findVal(r,['Warp CMPX','Warp Cmpx']))})).filter(r=>r.supplier&&r.count);
    }else if(sl.includes('supplierwi')&&sl.includes('warp')){
      out.suppWarp=rows.map(r=>({supplier:String(findVal(r,['Yarn Supplier','Supplier'])||'').trim(),count:String(findVal(r,['Count','Yarn Count'])||'').trim(),creel:pn(findVal(r,['No of Creel'])),spg:pn(findVal(r,['PG. BKS/MM','SPG. BKS/MM','SPG BKS/MM'])),wdg:pn(findVal(r,['WDG. BKS/MM','WDG BKS/MM'])),total:pn(findVal(r,['TOTAL  BKS/MM','TOTAL BKS/MM']))})).filter(r=>r.supplier&&r.count);
    }else if(sl.includes('loom')&&!sl.includes('supplier')){
      out.loom=rows.map(r=>({count:String(findVal(r,['Count'])||'').trim(),lot:String(findVal(r,['Lot'])||'').trim(),supplier:String(findVal(r,['Yarn Supplier','Supplier'])||'').trim(),shifts:pn(findVal(r,['No of Shift','No Of Shift'])),effi:pn(findVal(r,['EFFI.','EFFI'])),rpm:pn(findVal(r,['RPM'])),warpCmpx:pn(findVal(r,['Warp CMPX','Warp Cmpx'])),weftCmpx:pn(findVal(r,['Weft Cmpx','Weft CMPX','Weft Cmpx '])),h2Cmpx:pn(findVal(r,['H2 Cmpx','H2 CMPX']))})).filter(r=>r.count&&r.supplier);
    }else if(sl.includes('warpingperform')&&!sl.includes('supplier')){
      out.warp=rows.map(r=>({count:String(findVal(r,['Yarn Count','Count'])||'').trim(),supplier:String(findVal(r,['Yarn Supplier','Supplier'])||'').trim(),lot:String(findVal(r,['Lot'])||'').trim(),creel:pn(findVal(r,['No of Creel',' No of Creel '])),spg:pn(findVal(r,['SPG. BKS/MM','SPG BKS/MM'])),wdg:pn(findVal(r,['WDG. BKS/MM','WDG BKS/MM'])),total:pn(findVal(r,['TOTAL  BKS/MM','TOTAL BKS/MM']))})).filter(r=>r.count&&r.supplier);
    }else if(sl.includes('yarnparam')){
      out.yarnParam=aoa.filter(r=>r.some(c=>c!==''&&c!==null));
    }else if(sl.includes('processresult')){
      out.processResults=aoa.filter(r=>r.some(c=>c!==''&&c!==null));
    }else if(sl.includes('finalsumm')){
      out.finalSummary=rows.map(r=>({srNo:findVal(r,['Sr. No.','Sr No','SrNo'])||'',count:String(findVal(r,['Count'])||'').trim(),supplier:String(findVal(r,['Yarn Supplier','Supplier'])||'').trim(),lot:String(findVal(r,['Lot'])||'').trim(),lotQty:pn(findVal(r,['Lot QTY.  (MT)','Lot QTY (MT)','Lot QTY'])),application:String(findVal(r,['Application'])||'').trim(),yarnObs:String(findVal(r,['Yarn Parameters – Key Observations','Yarn Parameters','Yarn Obs'])||'').trim(),warpObs:String(findVal(r,['Warping – Key Observations','Warping Observations','Warping Obs'])||'').trim(),weavObs:String(findVal(r,['Weaving – Key Observations','Weaving Observations','Weaving Obs'])||'').trim(),procObs:String(findVal(r,['Processing – Key Observations','Processing Observations'])||'').trim(),remarks:String(findVal(r,['Final Remarks','Remarks'])||'').trim(),decision:String(findVal(r,['Decision'])||'').trim()})).filter(r=>r.supplier||r.count);
    }
  }
  return out;
}

// ─── CHART DEFAULTS ──────────────────────────────────────────────────────────
Chart.defaults.color='#9CA3AF';
Chart.defaults.font.family="'Inter', sans-serif";
Chart.defaults.font.size=11;
const baseOpts=(yMin)=>{
  const o={responsive:true,maintainAspectRatio:false,

      tooltip:{backgroundColor:'rgba(10,10,10,0.9)',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,padding:10,titleColor:'#F8FAFC',bodyColor:'#D1D5DB',cornerRadius:8,titleFont:{weight:'600'}}},

// ─── COMPONENTS ──────────────────────────────────────────────────────────────
function ChartBox({cfg,title,sub,h=260}){
  const ref=useRef(null);
  useEffect(()=>{const c=new Chart(ref.current.getContext('2d'),cfg);return()=>c.destroy();},[]);
  return(<div className="chart-card"><div className="chart-card-header"><div className="chart-card-title">{title}</div>{sub&&<div className="chart-card-sub">{sub}</div>}</div><div className="chart-wrap" style={{height:h}}><canvas ref={ref}></canvas></div></div>);
}

function KPICard({label,value,desc,color='neutral',highlight, onClick, className=''}){
  return(<div className={`kpi-card ${className}${highlight?' highlight':''}${onClick?' clickable':''}`} onClick={onClick} style={onClick?{cursor:'pointer'}:{}}><div className="kpi-label">{label}</div><div className={`kpi-number ${color}`}>{value}</div>{desc&&<div className="kpi-desc">{desc}</div>}</div>);
}

function SortTable({cols,rows,rowCls,wrapText}){
  const[sort,setSort]=useState({k:null,d:1});
  const sorted=useMemo(()=>{
    if(!sort.k)return rows;
    return[...rows].sort((a,b)=>{
      const av=a[sort.k],bv=b[sort.k];
      if(av===null||av===undefined||av==='—')return 1;
      if(bv===null||bv===undefined||bv==='—')return -1;
      const na=parseFloat(av),nb=parseFloat(bv);
      if(!isNaN(na)&&!isNaN(nb))return na<nb?-sort.d:sort.d;
      return String(av)<String(bv)?-sort.d:sort.d;
    });
  },[rows,sort]);
  const click=k=>setSort(p=>({k,d:p.k===k?-p.d:1}));
  return(<div className="table-wrap"><table className={wrapText?'wrap-text':''}>
    <thead><tr>{cols.map(c=><th key={c.k} className={sort.k===c.k?'sorted':''} onClick={()=>click(c.k)}>{c.h}{sort.k===c.k?(sort.d>0?' ↑':' ↓'):''}</th>)}</tr></thead>
    <tbody>{sorted.map((r,i)=><tr key={i} className={rowCls?rowCls(r):''}>
      {cols.map(c=><td key={c.k} className={c.cls?c.cls(r):''}>{c.render?c.render(r):(r[c.k]??'—')}</td>)}
    </tr>)}</tbody>
  </table></div>);
}

const PAGE_SIZE = 50;

function RawSheetTable({data}){
  const [page, setPage] = useState(0);
  const [search, setSearch] = useState('');
  const [ready, setReady] = useState(false);

  // Defer heavy render to next frame so tab switch feels instant
  useEffect(() => {
    const id = requestAnimationFrame(() => setReady(true));
    return () => cancelAnimationFrame(id);
  }, []);

  if(!data||!data.length) return <div className="empty-state"><p>No data found.</p></div>;
  if(!ready) return (
    <div style={{padding:'48px',textAlign:'center',color:'var(--text-muted)'}}>
      <div style={{width:28,height:28,border:'3px solid var(--border)',borderTopColor:'var(--blue)',borderRadius:'50%',animation:'spin .7s linear infinite',margin:'0 auto 12px'}}></div>
      <div style={{fontSize:13}}>Loading table…</div>
    </div>
  );

  const headers = data[0].map((h,i) => h!==''&&h!==null ? String(h) : `Col ${i+1}`);
  const allRows = data.slice(1).filter(r => r.some(c => c!==''&&c!==null));

  // Search filter — match any cell in row
  const q = search.trim().toLowerCase();
  const filtered = q
    ? allRows.filter(r => r.some(c => c!==null&&c!==''&&String(c).toLowerCase().includes(q)))
    : allRows;

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const safePage = Math.min(page, Math.max(0, totalPages - 1));
  const pageRows = filtered.slice(safePage * PAGE_SIZE, (safePage + 1) * PAGE_SIZE);

  // Page number buttons — show max 7
  const pageNums = [];
  const maxBtns = 7;
  let start = Math.max(0, safePage - Math.floor(maxBtns/2));
  let end = Math.min(totalPages, start + maxBtns);
  if(end - start < maxBtns) start = Math.max(0, end - maxBtns);
  for(let i = start; i < end; i++) pageNums.push(i);

  return(<>
    <div className="raw-search">
      <label>🔍 Filter rows:</label>
      <input
        type="text" placeholder="Type to search any cell…"
        value={search} onChange={e=>{ setSearch(e.target.value); setPage(0); }}
      />
    </div>
    <div className="raw-row-count">
      Showing <strong>{filtered.length}</strong> of <strong>{allRows.length}</strong> rows ·
      &nbsp;<strong>{headers.length}</strong> columns
    </div>
    <div className="raw-wrap">
      <table className="raw-table">
        <thead><tr>{headers.map((h,i)=><th key={i}>{h}</th>)}</tr></thead>
        <tbody>
          {pageRows.map((row,i)=>(
            <tr key={i}>
              {headers.map((_,j)=>{
                const cell = row[j];
                return <td key={j}>{cell===null||cell===''?'—':String(cell)}</td>;
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
    {totalPages > 1 && (
      <div className="raw-pagination">
        <div className="raw-page-info">
          Page <strong>{safePage+1}</strong> of <strong>{totalPages}</strong>
          &nbsp;·&nbsp; rows {safePage*PAGE_SIZE+1}–{Math.min((safePage+1)*PAGE_SIZE, filtered.length)}
        </div>
        <div className="raw-page-btns">
          <button className="raw-page-btn" disabled={safePage===0} onClick={()=>setPage(0)}>«</button>
          <button className="raw-page-btn" disabled={safePage===0} onClick={()=>setPage(p=>Math.max(0,p-1))}>‹ Prev</button>
          {pageNums.map(n=>(
            <button key={n} className={`raw-page-btn${safePage===n?' active':''}`} onClick={()=>setPage(n)}>{n+1}</button>
          ))}
          <button className="raw-page-btn" disabled={safePage>=totalPages-1} onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))}>Next ›</button>
          <button className="raw-page-btn" disabled={safePage>=totalPages-1} onClick={()=>setPage(totalPages-1)}>»</button>
        </div>
      </div>
    )}
  </>);
}

function InfoBox({children}){
  return(<div className="info-box"><div className="info-box-icon">ℹ️</div><p>{children}</p></div>);
}

// ─── SUPPLIER LOOM ────────────────────────────────────────────────────────────
function SupplierLoomTab({rows}){
  const ext=rows.filter(r=>!isVFB(r.supplier));
  const[sel,setSel]=useState('ALL');
  const counts=['ALL',...new Set(rows.map(r=>r.count))];
  const fr=sel==='ALL'?rows:rows.filter(r=>r.count===sel);
  const fv=fr.filter(r=>isVFB(r.supplier));
  const fe=fr.filter(r=>!isVFB(r.supplier));
  const allFv=rows.filter(r=>isVFB(r.supplier));
  let vE=avg(fv.map(r=>r.effi)); if(vE===null) vE=avg(allFv.map(r=>r.effi));
  let vR=avg(fv.map(r=>r.rpm)); if(vR===null) vR=avg(allFv.map(r=>r.rpm));
  let vWC=avg(fv.filter(r=>r.warpCmpx!==null).map(r=>r.warpCmpx)); if(vWC===null) vWC=avg(allFv.filter(r=>r.warpCmpx!==null).map(r=>r.warpCmpx));
  let vWt=avg(fv.filter(r=>r.weftCmpx!==null).map(r=>r.weftCmpx)); if(vWt===null) vWt=avg(allFv.filter(r=>r.weftCmpx!==null).map(r=>r.weftCmpx));
  const labels=fe.map(r=>short(r.supplier));

  const eCfg=useMemo(()=>({type:'bar',data:{labels,datasets:[{label:'Efficiency %',data:fe.map(r=>r.effi),backgroundColor:fe.map(r=>barC(r.effi,vE,false)),borderRadius:4,borderWidth:0,barPercentage:0.6,categoryPercentage:0.7},rl(vE,labels.length,'Std')].filter(Boolean)},options:{...baseOpts(vE?Math.max(85,vE-8):85)}}),[sel]);
  const rCfg=useMemo(()=>({type:'bar',data:{labels,datasets:[{label:'RPM',data:fe.map(r=>r.rpm),backgroundColor:fe.map(r=>barC(r.rpm,vR,false)),borderRadius:4,borderWidth:0,barPercentage:0.6,categoryPercentage:0.7},rl(vR,labels.length,'Std')].filter(Boolean)},options:{...baseOpts(vR?Math.max(850,vR-80):850)}}),[sel]);
  const warpCfg = useMemo(() => {

  },[sel]);

  const best=ext.reduce((b,r)=>(!r.effi?b:(!b||r.effi>b.effi)?r:b),null);
  const worst=ext.reduce((b,r)=>(!r.effi?b:(!b||r.effi<b.effi)?r:b),null);
  const tRows=fr.map(r=>({...r,_e:fmt(r.effi),_r:r.rpm?Math.round(r.rpm)+'':'—',_wc:fmt(r.warpCmpx),_wt:fmt(r.weftCmpx),_sh:r.shifts?r.shifts.toLocaleString():'—'}));
  const cols=[
    {k:'supplier',h:'Supplier',cls:()=>'primary',render:r=><>{r.supplier}{isVFB(r.supplier)&&<span className="vfb-tag">★ VFB</span>}</>},
    {k:'count',h:'Count',cls:()=>'center'},

    {k:'_r',h:'RPM',cls:r=>isVFB(r.supplier)?'bench':r.rpm&&vR?(r.rpm>=vR?'good':'bad'):'number'},
    {k:'_wc',h:'Warp CMPX',cls:r=>isVFB(r.supplier)?'bench':r.warpCmpx&&vWC?(r.warpCmpx<=vWC?'good':'bad'):'number'},
    {k:'_wt',h:'Weft CMPX',cls:r=>isVFB(r.supplier)?'bench':r.weftCmpx&&vWt?(r.weftCmpx<=vWt?'good':'bad'):'number'},
  ];
  return(<div className="fade">
    <div className="page-header">
      <div className="breadcrumb"><span>Dashboard</span><span>›</span><span>Loom</span></div>
      <h1>Supplier-wise Loom Performance</h1>

      <KPICard label="Lowest EFFI" value={worst?fmt(worst.effi)+'%':'—'} desc={worst?short(worst.supplier):'—'} color="red"/>

      <ChartBox key={`sl-weft-${sel}`} cfg={weftCfg} title="Weft CMPX Analysis" sub="Weft complexity breaks — lower is better"/>

// ─── SUPPLIER WARPING ─────────────────────────────────────────────────────────
function SupplierWarpTab({rows}){
  const ext=rows.filter(r=>!isVFB(r.supplier));
  const[sel,setSel]=useState('ALL');
  const counts=['ALL',...new Set(rows.map(r=>r.count))];
  const fr=sel==='ALL'?rows:rows.filter(r=>r.count===sel);
  const fv=fr.filter(r=>isVFB(r.supplier));
  const fe=fr.filter(r=>!isVFB(r.supplier));
  const allFv=rows.filter(r=>isVFB(r.supplier));
  let vT=avg(fv.map(r=>r.total)); if(vT===null) vT=avg(allFv.map(r=>r.total));
  let vS=avg(fv.map(r=>r.spg)); if(vS===null) vS=avg(allFv.map(r=>r.spg));
  let vW=avg(fv.map(r=>r.wdg)); if(vW===null) vW=avg(allFv.map(r=>r.wdg));
  const labels=fe.map(r=>short(r.supplier));

  const brkCfg=useMemo(()=>({type:'bar',data:{labels,datasets:[
    {label:'SPG BKS/MM',data:fe.map(r=>r.spg),backgroundColor:'#A3FF12',borderRadius:0,borderWidth:0,stack:'s',barPercentage:0.6,categoryPercentage:0.7},
    {label:'WDG BKS/MM',data:fe.map(r=>r.wdg),backgroundColor:'rgba(255,255,255,0.15)',borderRadius:0,borderWidth:0,stack:'s',barPercentage:0.6,categoryPercentage:0.7},
    {label:'Total BKS/MM',data:fe.map(r=>r.total),type:'line',borderColor:'#3BFF5B',borderWidth:2,pointRadius:4,pointBackgroundColor:'#3BFF5B',fill:false,tension:0},
    vT!==null?{label:`VFB Total (${fmt(vT,3)})`,data:Array(labels.length).fill(vT),type:'line',borderColor:'#F2C80F',borderWidth:2,borderDash:[4,4],pointRadius:0,fill:false,order:-1}:null
  ].filter(Boolean)},options:{...baseOpts(0)}}),[sel]);

  const hCfg=useMemo(()=>{
    const ranked=[...fe].filter(r=>r.total!==null&&r.total!==undefined).sort((a,b)=>a.total-b.total);
    const validLabels=ranked.map(r=>short(r.supplier));
    const o={...baseOpts(),indexAxis:'y'}; delete o.scales.y.min; o.scales.x={...o.scales.x,min:0};
    return {type:'bar',data:{labels:validLabels,datasets:[{label:'Total BKS/MM',data:ranked.map(r=>r.total),backgroundColor:ranked.map(r=>barC(r.total,vT,true)),borderRadius:4,borderWidth:0,barPercentage:0.6,categoryPercentage:0.7},vT!==null?rl(vT,validLabels.length,'Std'):null].filter(Boolean)},options:o};
  },[sel,vT]);

  const best=ext.reduce((b,r)=>(!r.total?b:(!b||r.total<b.total)?r:b),null);
  const worst=ext.reduce((b,r)=>(!r.total?b:(!b||r.total>b.total)?r:b),null);
  const tRows=fr.map(r=>({...r,_s:fmt(r.spg,3),_w:fmt(r.wdg,3),_t:fmt(r.total,3),_c:r.creel??'—'}));
  const cols=[
    {k:'supplier',h:'Supplier',cls:()=>'primary',render:r=><>{r.supplier}{isVFB(r.supplier)&&<span className="vfb-tag">★ VFB</span>}</>},
    {k:'count',h:'Count',cls:()=>'center'},
    {k:'_c',h:'Creels',cls:()=>'number'},
    {k:'_s',h:'SPG BKS/MM',cls:r=>isVFB(r.supplier)?'bench':r.spg&&vS?(r.spg<=vS?'good':'bad'):'number'},
    {k:'_w',h:'WDG BKS/MM',cls:r=>isVFB(r.supplier)?'bench':r.wdg&&vW?(r.wdg<=vW?'good':'bad'):'number'},
    {k:'_t',h:'Total BKS/MM',cls:r=>isVFB(r.supplier)?'bench':r.total&&vT?(r.total<=vT?'good':'bad'):'number'},
  ];
  return(<div className="fade">
    <div className="page-header">
      <div className="breadcrumb"><span>Dashboard</span><span>›</span><span>Warping</span></div>
      <h1>Supplier-wise Warping Performance</h1>
      <p>Break rates (BKS/MM) per supplier compared to VFB internal standard. Lower breaks = better quality.</p>
    </div>
    <div className="kpi-grid">
      <KPICard label="VFB Total BKS/MM" value={vT?fmt(vT,3):'—'} desc="Benchmark target" color="amber" highlight/>
      <KPICard label="VFB SPG Breaks" value={vS?fmt(vS,3):'—'} desc="Spinning frame standard" color="amber" highlight/>
      <KPICard label="VFB WDG Breaks" value={vW?fmt(vW,3):'—'} desc="Winding standard" color="amber" highlight/>
      <KPICard label="Best Outsource" value={best?fmt(best.total,3):'—'} desc={best?`${short(best.supplier)} · ${best.count}`:'—'} color="green"/>
      <KPICard label="Highest Breaks" value={worst?fmt(worst.total,3):'—'} desc={worst?`${short(worst.supplier)} · ${worst.count}`:'—'} color="red"/>
      <KPICard label="Suppliers Tested" value={new Set(ext.map(r=>r.supplier)).size+''} desc="Outsource suppliers" color="blue"/>
    </div>
    <div className="filter-bar">
      <span className="filter-label">Filter by Count:</span>
      {counts.map(c=><button key={c} className={`filter-btn${sel===c?' active':''}`} onClick={()=>setSel(c)}>{c}</button>)}
    </div>
    <div className="table-card">
      <div className="table-card-header">
        <div className="table-card-title">Full Warping Data Table</div>
        <div className="table-card-sub">Click any column to sort · Gold = VFB benchmark · Green = at/below VFB · Red = above VFB · Lower BKS/MM is better</div>
      </div>
      <SortTable cols={cols} rows={tRows} rowCls={r=>isVFB(r.supplier)?'vfb':''}/>
    </div>
    <div className="legend">
      <div className="legend-item"><div className="legend-dot" style={{background:'#A3FF12'}}></div>SPG Breaks</div>
      <div className="legend-item"><div className="legend-dot" style={{background:'rgba(255,255,255,0.15)'}}></div>WDG Breaks</div>
      <div className="legend-item"><div className="legend-dot" style={{background:'#3BFF5B',height:3}}></div>Total Breaks</div>
      <div className="legend-item"><div className="legend-dot" style={{background:'#F2C80F',height:3}}></div>VFB Benchmark</div>
    </div>
    <div className="chart-grid cols-2">
      <ChartBox key={`sw-b-${sel}`} cfg={brkCfg} title="Break Rate Breakdown by Supplier" sub="Stacked SPG+WDG bars · Green line = total · Gold dashed = VFB target" h={280}/>
      <ChartBox key={`sw-h-${sel}`} cfg={hCfg} title="Total Breaks Ranking" sub="Horizontal comparison — green = at/below VFB, red = above" h={280}/>
    </div>
  </div>);
}

// ─── LOT LOOM ─────────────────────────────────────────────────────────────────
function LotLoomTab({rows}){
  const groups=useMemo(()=>groupBy(rows,'count'),[rows]);
  const counts=['ALL', ...Object.keys(groups)];
  const[active,setActive]=useState('ALL');
  const allFv=useMemo(()=>rows.filter(r=>isVFB(r.supplier)),[rows]);
  const g_vE=avg(allFv.map(r=>r.effi)), g_vR=avg(allFv.map(r=>r.rpm));
  const g_vWC=avg(allFv.filter(r=>r.warpCmpx!==null).map(r=>r.warpCmpx));
  const g_vWt=avg(allFv.filter(r=>r.weftCmpx!==null).map(r=>r.weftCmpx));
  const Panel=({cr,cn})=>{
    const vfb=cr.filter(r=>isVFB(r.supplier)),ext=cr.filter(r=>!isVFB(r.supplier));
    let vE=avg(vfb.map(r=>r.effi)); if(vE===null) vE=g_vE;
    let vR=avg(vfb.map(r=>r.rpm)); if(vR===null) vR=g_vR;
    let vWC=avg(vfb.filter(r=>r.warpCmpx!==null).map(r=>r.warpCmpx)); if(vWC===null) vWC=g_vWC;
    let vWt=avg(vfb.filter(r=>r.weftCmpx!==null).map(r=>r.weftCmpx)); if(vWt===null) vWt=g_vWt;
    const rankedExt=[...ext].sort((a,b)=>(b.effi||0)-(a.effi||0));
    const labelsRanking=rankedExt.map(r=>`${short(r.supplier,12)} (${r.lot||'—'})`);

    const rankingCfg=useMemo(()=>{
      const o={...baseOpts(),indexAxis:'y'}; delete o.scales.y.min;
      if(vE!==null)o.scales.x={...o.scales.x,min:Math.max(80,vE-10)};
      return {type:'bar',data:{labels:labelsRanking,datasets:[{label:'Efficiency %',data:rankedExt.map(r=>r.effi),backgroundColor:rankedExt.map(r=>barC(r.effi,vE,false)),borderRadius:4,borderWidth:0,barPercentage:0.6,categoryPercentage:0.7},vE!==null?rl(vE,labelsRanking.length,'Std'):null].filter(Boolean)},options:o};
    },[cn,vE]);
    const eCfg=useMemo(()=>({type:'bar',data:{labels,datasets:[{label:'EFFI %',data:ext.map(r=>r.effi),backgroundColor:ext.map(r=>barC(r.effi,vE,false)),borderRadius:4,borderWidth:0,barPercentage:0.6,categoryPercentage:0.7},vE!==null?{label:`VFB (${fmt(vE)}%)`,data:Array(labels.length).fill(vE),type:'line',borderColor:'#F2C80F',borderWidth:2,borderDash:[4,4],pointRadius:0,fill:false,order:-1}:null].filter(Boolean)},options:{...baseOpts(vE?Math.max(85,vE-8):85)}}),[cn]);
    const tRows=cr.map(r=>({...r,_e:fmt(r.effi),_r:r.rpm?Math.round(r.rpm)+'':'—',_wc:fmt(r.warpCmpx),_wt:fmt(r.weftCmpx),_h:fmt(r.h2Cmpx),_sh:r.shifts||'—'}));
    const cols=[
      {k:'supplier',h:'Supplier',cls:()=>'primary',render:r=><>{r.supplier}{isVFB(r.supplier)&&<span className="vfb-tag">★</span>}</>},
      {k:'lot',h:'Lot',cls:()=>'center'},
      {k:'_sh',h:'Shifts',cls:()=>'number'},
      {k:'_e',h:'EFFI %',cls:r=>isVFB(r.supplier)?'bench':r.effi&&vE?(r.effi>=vE?'good':'bad'):'number'},
      {k:'_r',h:'RPM',cls:r=>isVFB(r.supplier)?'bench':r.rpm&&vR?(r.rpm>=vR?'good':'bad'):'number'},
      {k:'_wc',h:'Warp CMPX',cls:r=>isVFB(r.supplier)?'bench':r.warpCmpx&&vWC?(r.warpCmpx<=vWC?'good':'bad'):'number'},
      {k:'_wt',h:'Weft CMPX',cls:r=>isVFB(r.supplier)?'bench':r.weftCmpx&&vWt?(r.weftCmpx<=vWt?'good':'bad'):'number'},
      {k:'_h',h:'H2 CMPX',cls:()=>'number'},
    ];
    return(<div className="fade">
      <div className="kpi-grid">
        <KPICard label="VFB EFFI Benchmark" value={vE?fmt(vE)+'%':'—'} desc="Standard" color="amber" highlight/>
        <KPICard label="VFB RPM Benchmark" value={vR?Math.round(vR)+'':'—'} desc="Standard" color="amber" highlight/>

// ─── LOT WARP ─────────────────────────────────────────────────────────────────
function LotWarpTab({rows}){
  const groups=useMemo(()=>groupBy(rows,'count'),[rows]);
  const counts=['ALL', ...Object.keys(groups)];
  const[active,setActive]=useState('ALL');
  const allFv=useMemo(()=>rows.filter(r=>isVFB(r.supplier)),[rows]);
  const g_vT=avg(allFv.map(r=>r.total)), g_vS=avg(allFv.map(r=>r.spg)), g_vW=avg(allFv.map(r=>r.wdg));
  const Panel=({cr,cn})=>{
    const vfb=cr.filter(r=>isVFB(r.supplier)),ext=cr.filter(r=>!isVFB(r.supplier));
    let vT=avg(vfb.map(r=>r.total)); if(vT===null) vT=g_vT;
    let vS=avg(vfb.map(r=>r.spg)); if(vS===null) vS=g_vS;
    let vW=avg(vfb.map(r=>r.wdg)); if(vW===null) vW=g_vW;
    const labels=ext.map(r=>`${short(r.supplier,12)} (${r.lot||'—'})`);
    const bCfg=useMemo(()=>({type:'bar',data:{labels,datasets:[
      {label:'SPG BKS/MM',data:ext.map(r=>r.spg),backgroundColor:'#A3FF12',borderRadius:0,borderWidth:0,stack:'s',barPercentage:0.6,categoryPercentage:0.7},
      {label:'WDG BKS/MM',data:ext.map(r=>r.wdg),backgroundColor:'rgba(255,255,255,0.15)',borderRadius:0,borderWidth:0,stack:'s',barPercentage:0.6,categoryPercentage:0.7},
      {label:'Total',data:ext.map(r=>r.total),type:'line',borderColor:'#3BFF5B',borderWidth:2,pointRadius:4,pointBackgroundColor:'#3BFF5B',fill:false,tension:0},
      vT!==null?{label:`VFB (${fmt(vT,3)})`,data:Array(labels.length).fill(vT),type:'line',borderColor:'#F2C80F',borderWidth:2,borderDash:[4,4],pointRadius:0,fill:false,order:-1}:null
    ].filter(Boolean)},options:{...baseOpts(0)}}),[cn]);

    const rankedT=[...ext].filter(r=>r.total!==null&&r.total!==undefined).sort((a,b)=>a.total-b.total);
    const rankedS=[...ext].filter(r=>r.spg!==null&&r.spg!==undefined).sort((a,b)=>a.spg-b.spg);
    const rankedW=[...ext].filter(r=>r.wdg!==null&&r.wdg!==undefined).sort((a,b)=>a.wdg-b.wdg);
    
    const rnkTCfg=useMemo(()=>{
      const o={...baseOpts(),indexAxis:'y'}; delete o.scales.y.min; o.scales.x={...o.scales.x,min:0};
      return {type:'bar',data:{labels:rankedT.map(r=>`${short(r.supplier,12)} (${r.lot||'—'})`),datasets:[{label:'Total BKS/MM',data:rankedT.map(r=>r.total),backgroundColor:rankedT.map(r=>barC(r.total,vT,true)),borderRadius:4,borderWidth:0,barPercentage:0.6,categoryPercentage:0.7},vT!==null?rl(vT,rankedT.length,'Total Std'):null].filter(Boolean)},options:o};
    },[cn,vT]);

    const rnkSCfg=useMemo(()=>{
      const o={...baseOpts(),indexAxis:'y'}; delete o.scales.y.min; o.scales.x={...o.scales.x,min:0};
      return {type:'bar',data:{labels:rankedS.map(r=>`${short(r.supplier,12)} (${r.lot||'—'})`),datasets:[{label:'SPG BKS/MM',data:rankedS.map(r=>r.spg),backgroundColor:rankedS.map(r=>barC(r.spg,vS,true)),borderRadius:4,borderWidth:0,barPercentage:0.6,categoryPercentage:0.7},vS!==null?rl(vS,rankedS.length,'SPG Std'):null].filter(Boolean)},options:o};
    },[cn,vS]);

    const rnkWCfg=useMemo(()=>{
      const o={...baseOpts(),indexAxis:'y'}; delete o.scales.y.min; o.scales.x={...o.scales.x,min:0};
      return {type:'bar',data:{labels:rankedW.map(r=>`${short(r.supplier,12)} (${r.lot||'—'})`),datasets:[{label:'WDG BKS/MM',data:rankedW.map(r=>r.wdg),backgroundColor:rankedW.map(r=>barC(r.wdg,vW,true)),borderRadius:4,borderWidth:0,barPercentage:0.6,categoryPercentage:0.7},vW!==null?rl(vW,rankedW.length,'WDG Std'):null].filter(Boolean)},options:o};
    },[cn,vW]);
    const tRows=cr.map(r=>({...r,_s:fmt(r.spg,3),_w:fmt(r.wdg,3),_t:fmt(r.total,3),_c:r.creel??'—'}));
    const cols=[
      {k:'supplier',h:'Supplier',cls:()=>'primary',render:r=><>{r.supplier}{isVFB(r.supplier)&&<span className="vfb-tag">★</span>}</>},
      {k:'lot',h:'Lot',cls:()=>'center'},{k:'_c',h:'Creels',cls:()=>'number'},
      {k:'_s',h:'SPG BKS/MM',cls:r=>isVFB(r.supplier)?'bench':r.spg&&vS?(r.spg<=vS?'good':'bad'):'number'},
      {k:'_w',h:'WDG BKS/MM',cls:r=>isVFB(r.supplier)?'bench':r.wdg&&vW?(r.wdg<=vW?'good':'bad'):'number'},
      {k:'_t',h:'Total BKS/MM',cls:r=>isVFB(r.supplier)?'bench':r.total&&vT?(r.total<=vT?'good':'bad'):'number'},
    ];
    return(<div className="fade">
      <div className="kpi-grid">
        <KPICard label="VFB Total BKS/MM" value={vT?fmt(vT,3):'—'} desc="Benchmark target" color="amber" highlight/>
        <KPICard label="Best Lot" value={ext.reduce((b,r)=>(!r.total?b:(!b||r.total<b.total)?r:b),null)?.total?fmt(ext.reduce((b,r)=>(!r.total?b:(!b||r.total<b.total)?r:b),null).total,3):'—'} desc="Lowest break rate" color="green"/>
        <KPICard label="Total Lots" value={ext.length+''} desc="Outsource lots" color="neutral"/>
      </div>
      <div className="table-card">
        <div className="table-card-header"><div className="table-card-title">Lot-wise Detail — {cn}</div><div className="table-card-sub">Click column headers to sort</div></div>
        <SortTable cols={cols} rows={tRows} rowCls={r=>isVFB(r.supplier)?'vfb':''}/>
      </div>
      <div className="chart-grid cols-1"><ChartBox key={`lw-${cn}`} cfg={bCfg} title={`Warping Break Rates — ${cn}`} sub="SPG + WDG stacked · Green line = total breaks · Gold dashed = VFB target · Lower = better" h={300}/></div>
      <div className="sec-divider" style={{marginTop:32}}>
        <h2>Ranking Analysis</h2>
        <p>Performance ranked lowest breaks to highest against VFB standards.</p>
      </div>
      <div className="chart-grid cols-2">
        <ChartBox key={`lw-rnkt-${cn}`} cfg={rnkTCfg} title="Total BKS/MM Ranking" sub="Ranked lowest to highest — green = at/below VFB" h={280}/>
        <ChartBox key={`lw-rnks-${cn}`} cfg={rnkSCfg} title="SPG BKS/MM Ranking" sub="Ranked lowest to highest — green = at/below VFB" h={280}/>
      </div>
      <div className="chart-grid cols-1">
        <ChartBox key={`lw-rnkw-${cn}`} cfg={rnkWCfg} title="WDG BKS/MM Ranking" sub="Ranked lowest to highest — green = at/below VFB" h={280}/>
      </div>
    </div>);
  };
  return(<div>
    <div className="page-header">
      <div className="breadcrumb"><span>Dashboard</span><span>›</span><span>Lot-wise Warping</span></div>
      <h1>Warping Performance — Lot-wise Detail</h1>
      <p>Individual lot break rates per yarn count. Select a count to view details.</p>
    </div>
    <div className="filter-bar">
      <span className="filter-label">Filter by Count:</span>
      {counts.map(c=><button key={c} className={`filter-btn${active===c?' active':''}`} onClick={()=>setActive(c)}>{c}</button>)}
    </div>
    {active&&(active==='ALL'?rows:groups[active])&&<Panel key={active} cr={active==='ALL'?rows:groups[active]} cn={active}/>}
  </div>);
}

// ─── FINAL SUMMARY ────────────────────────────────────────────────────────────
function FinalSummaryTab({rows}){
  const passed=rows.filter(r=>r.decision.includes('✅')).length;
  const failed=rows.filter(r=>r.decision.includes('❌')).length;
  const rate=rows.length?Math.round(passed/rows.length*100):0;
  const [filter, setFilter] = useState(null);
  
  const filteredRows = useMemo(() => {
    if (filter === 'approved') return rows.filter(r => r.decision.includes('✅'));
    if (filter === 'rejected') return rows.filter(r => r.decision.includes('❌'));
    return rows;
  }, [rows, filter]);
  
  const tRows=filteredRows.map(r=>({...r,_qty:r.lotQty?fmt(r.lotQty,3)+' MT':'—'}));
  const cols=[
    {k:'srNo',h:'#',cls:()=>'center'},
    {k:'count',h:'Count',cls:()=>'primary'},
    {k:'supplier',h:'Supplier',cls:()=>'primary'},
    {k:'lot',h:'Lot',cls:()=>'center'},
    {k:'_qty',h:'Lot Qty',cls:()=>'number'},
    {k:'application',h:'Application'},
    {k:'yarnObs',h:'Yarn Observation',cls:()=>'primary'},
    {k:'warpObs',h:'Warping Obs.'},
    {k:'weavObs',h:'Weaving Obs.'},
    {k:'remarks',h:'Remarks',cls:()=>'primary'},
    {k:'decision',h:'Decision',cls:()=>'center',render:r=>r.decision.includes('✅')?<span className="badge-approved">✅ Approved</span>:r.decision.includes('❌')?<span className="badge-rejected">❌ Rejected</span>:<span>{r.decision}</span>},
  ];
  return(<div className="fade">
    <div className="page-header">
      <div className="breadcrumb"><span>Dashboard</span><span>›</span><span>Final Summary</span></div>
      <h1>Final Summary — Trial Decisions</h1>
      <p>Comprehensive decision record for all outsource yarn trials including observations from each process stage.</p>
    </div>
    <div className="kpi-grid">
      <KPICard label="Total Trials" value={rows.length+''} desc="Outsource yarn lots evaluated" color="blue"/>
      <KPICard 
        label="Approved" value={passed+''} desc="Click to filter approved" color="green"
        onClick={() => setFilter(filter === 'approved' ? null : 'approved')}
        className={filter === 'approved' ? 'active-approved' : ''}
      />
      <KPICard 
        label="Rejected" value={failed+''} desc="Click to filter rejected" color="red"
        onClick={() => setFilter(filter === 'rejected' ? null : 'rejected')}
        className={filter === 'rejected' ? 'active-rejected' : ''}
      />
      <KPICard label="Approval Rate" value={rate+'%'} desc="Overall success ratio" color={rate>=70?'green':'red'}/>
    </div>
    <div className="table-card">
      <div className="table-card-header">
        <div className="table-card-title">All Trial Records</div>
        <div className="table-card-sub">Click column headers to sort · Scroll right for all observation columns</div>
      </div>
      <SortTable cols={cols} rows={tRows} wrapText={true}/>
    </div>
  </div>);
}

function downloadDashboard(data){
  const scriptContent=document.querySelector('script[type="text/babel"]').innerHTML;
  const styleContent=Array.from(document.querySelectorAll('style')).map(s=>s.innerHTML).join('\n');
  const html=`<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vardhman Dashboard — ${data.fileName}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"><\/script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"><\/script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"><\/script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"><\/script>
<style>${styleContent}</style>
</head><body>
<div id="root"></div>
<script>window.__DATA__=${JSON.stringify({...data,preloaded:true})};<\/script>
<script type="text/babel">
${scriptContent.replace(/window\.__PRELOADED_DATA__/g,'window.__DATA__')}
<\/script>
</body></html>`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));
  a.download=`Vardhman_Dashboard_${data.fileName.replace(/\.[^.]+$/,'')}.html`;
  a.click();URL.revokeObjectURL(a.href);
}

// ─── DASHBOARD SHELL ──────────────────────────────────────────────────────────
const NAV=[
  {id:'s-loom',label:'Supplier Loom',sub:'Aggregated',icon:'🏭'},
  {id:'s-warp',label:'Supplier Warping',sub:'Aggregated',icon:'🧵'},
  {id:'l-loom',label:'Lot-wise Loom',sub:'Detailed',icon:'📊'},
  {id:'l-warp',label:'Lot-wise Warping',sub:'Detailed',icon:'📈'},
  {id:'yarn',label:'Yarn Parameters',sub:'Raw sheet',icon:'🔬'},
  {id:'process',label:'Process Results',sub:'Raw sheet',icon:'🧪'},
  {id:'summary',label:'Final Summary',sub:'Decisions',icon:'✅'},
];

function Dashboard({data,onReset}){
  const[tab,setTab]=useState('s-loom');
  const[visited,setVisited]=useState(new Set(['s-loom']));
  const[sidebarOpen,setSidebarOpen]=useState(()=>localStorage.getItem('vfb-sb')!=='0');
  const[isMobileOpen,setIsMobileOpen]=useState(false);
  const isViewOnly=!onReset;

  const toggleSb = () => {
    if(window.innerWidth <= 1023) {
      setIsMobileOpen(!isMobileOpen);
    } else {
      const nv = !sidebarOpen;
      setSidebarOpen(nv);
      localStorage.setItem('vfb-sb', nv ? '1' : '0');
    }
  };

  const goTab = (id) => {
    setTab(id);
    setVisited(prev => { const s=new Set(prev); s.add(id); return s; });
    setIsMobileOpen(false);
  };

  // Lazy panel — render nothing until first visit, then keep mounted (hidden)
  const LazyPanel = ({id, children, fallback}) => {
    if(!visited.has(id)) return null;
    return(
      <div style={{display: tab===id ? 'block' : 'none'}}>
        {children || <div className="empty-state"><p>{fallback}</p></div>}
      </div>
    );
  };

  return(<div className="shell">
    <div className={`sidebar-overlay${isMobileOpen ? ' open' : ''}`} onClick={()=>setIsMobileOpen(false)}></div>
    <aside className={`sidebar${!sidebarOpen ? ' collapsed' : ''}${isMobileOpen ? ' open' : ''}`}>
      <div className="sb-brand" style={{cursor:'pointer', position: 'relative'}} onClick={toggleSb} title="Toggle Sidebar">
        <div className="sb-logo">VFB</div>
        <div className="sb-brand-info">
          <div className="sb-name">Vardhman Fabrics</div>
          <div className="sb-sub">Performance Dashboard</div>
        </div>
        <div className="sb-toggle-btn" style={{position:'absolute', right:'16px', color:'var(--text-muted)', fontSize:'18px'}}>☰</div>
      </div>
      <div className="sb-section-label">Analytics</div>
      <div className="sb-nav">
        {NAV.map(n=>(
          <div key={n.id} className={`sb-item${tab===n.id?' active':''}`} onClick={()=>goTab(n.id)}>
            <span className="sb-icon">{n.icon}</span>
            <div>
              <div className="sb-lbl">{n.label}</div>
              <div className="sb-sub-lbl">{n.sub}</div>
            </div>
          </div>
        ))}
      </div>
      <div className="sb-footer">
        {data.fileName&&<div className="sb-file-info"><div className="sb-file-name">📄 <span className="sb-footer-text">{data.fileName}</span></div></div>}
        {!isViewOnly&&<button className="sb-footer-btn download" onClick={()=>downloadDashboard(data)}><span>⬇</span> <span className="sb-footer-text">Download Dashboard</span></button>}
        {!isViewOnly&&<button className="sb-footer-btn reset" onClick={onReset}><span>↩</span> <span className="sb-footer-text">Upload New File</span></button>}
        {isViewOnly&&<div style={{padding:'4px 12px',fontSize:11,color:'rgba(255,255,255,0.3)',letterSpacing:1,textTransform:'uppercase'}}><span className="sb-footer-text">View Only</span></div>}
        <div className="creator-credit sb-footer-text">Designed & Developed by Husain</div>
      </div>
    </aside>
    <main className="content">
      <button className="menu-toggle" onClick={()=>setIsMobileOpen(true)} style={{marginBottom: 16}}>☰ Menu</button>
      <LazyPanel id="s-loom" fallback='No "Supplier Wise Loom Performance" sheet found.'>
        {data.suppLoom.length?<SupplierLoomTab rows={data.suppLoom}/>:null}
      </LazyPanel>
      <LazyPanel id="s-warp" fallback='No "Supplier wise Warping" sheet found.'>
        {data.suppWarp.length?<SupplierWarpTab rows={data.suppWarp}/>:null}
      </LazyPanel>
      <LazyPanel id="l-loom" fallback='No "Loom Performance" sheet found.'>
        {data.loom.length?<LotLoomTab rows={data.loom}/>:null}
      </LazyPanel>
      <LazyPanel id="l-warp" fallback='No "Warping Performance" sheet found.'>
        {data.warp.length?<LotWarpTab rows={data.warp}/>:null}
      </LazyPanel>
      <LazyPanel id="yarn" fallback='No "Yarn parameter" sheet found.'>
        {data.yarnParam.length?<YarnParamTab data={data.yarnParam}/>:null}
      </LazyPanel>
      <LazyPanel id="process" fallback='No "Process results" sheet found.'>
        {data.processResults.length?<ProcessResultsTab data={data.processResults}/>:null}
      </LazyPanel>
      <LazyPanel id="summary" fallback='No "Final Summary" sheet found.'>
        {data.finalSummary.length?<FinalSummaryTab rows={data.finalSummary}/>:null}
      </LazyPanel>
    </main>
  </div>);
}

// ─── UPLOAD ───────────────────────────────────────────────────────────────────
function UploadScreen({onData}){
  const[drag,setDrag]=useState(false);
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  const process=useCallback(file=>{
    if(!file)return;
    if(!file.name.match(/\.(xlsx|xls)$/i)){setErr('Please upload a valid .xlsx or .xls file.');return;}
    setErr('');setLoading(true);
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const result=parseExcel(new Uint8Array(e.target.result));
        result.fileName=file.name;
        const total=result.suppLoom.length+result.suppWarp.length+result.loom.length+result.warp.length;
        if(!total){setErr('No recognisable performance sheets found. Check that sheet names match expected names.');setLoading(false);return;}
        setLoading(false);onData(result);
      }catch(ex){setErr('Parse error: '+ex.message);setLoading(false);}
    };
    reader.readAsArrayBuffer(file);
  },[onData]);
  if(loading)return(<div className="loader-page"><div className="loader-spin"></div><div className="loader-txt">Reading Excel file…</div></div>);
  return(<div className="up-page"><div className="up-card">
    <div className="up-logo">VFB</div>
    <h1 className="up-title">Vardhman Performance Dashboard</h1>
    <p className="up-sub">Upload your Excel file to instantly generate interactive charts, benchmarked analysis, and sortable tables across all sheets.</p>
    <div className={`drop-zone${drag?' over':''}`}
      onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
      onDrop={e=>{e.preventDefault();setDrag(false);process(e.dataTransfer.files[0]);}}>
      <div className="drop-icon">📊</div>
      <div className="drop-label">Drop your .xlsx file here</div>
      <div className="drop-hint">or click to browse — .xlsx and .xls supported</div>
      <input type="file" accept=".xlsx,.xls" onChange={e=>process(e.target.files[0])}/>
    </div>
    <div className="up-features">
      <div className="up-feat"><span>🏭</span>Supplier Loom Analysis</div>
      <div className="up-feat"><span>🧵</span>Supplier Warping Analysis</div>
      <div className="up-feat"><span>📊</span>Lot-wise Loom Detail</div>
      <div className="up-feat"><span>📈</span>Lot-wise Warping Detail</div>
      <div className="up-feat"><span>🔬</span>Yarn Parameters</div>
      <div className="up-feat"><span>🧪</span>Process Results</div>
      <div className="up-feat"><span>✅</span>Final Summary</div>
      <div className="up-feat"><span>⬇</span>Download View-only</div>
    </div>
    {err&&<div className="up-err">⚠ {err}</div>}
  </div></div>);
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const preloaded=window.__DATA__||window.__DATA__;
  const[data,setData]=useState(preloaded||null);
  if(preloaded)return<Dashboard data={preloaded} onReset={null}/>;
  if(!data)return<UploadScreen onData={setData}/>;
  return<Dashboard data={data} onReset={()=>setData(null)}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
